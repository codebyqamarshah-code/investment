<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth - My Business</title>
  <link rel="stylesheet" href="./css/output.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #050a18; }
    h1, h2, h3, h4, h5, h6 { font-family: 'Outfit', sans-serif; }
  </style>
</head>
<body class="bg-[#050a18] text-slate-200 min-h-screen flex flex-col items-center justify-center p-4">

  <!-- Ambient Blur Glows -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-indigo-650/20 rounded-full blur-[100px] animate-pulse"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-violet-600/20 rounded-full blur-[100px] animate-pulse" style="animation-delay: 2s;"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-blue-900/10 rounded-full blur-[120px]"></div>
  </div>

  <div id="auth-card" class="w-full max-w-[440px] bg-[#0d162d]/65 backdrop-blur-xl border border-[#152243] rounded-3xl p-6 md:p-8 shadow-[0_0_50px_rgba(79,70,229,0.15)] relative z-10 transition-all duration-300">
    
    <!-- Brand Header -->
    <div class="flex flex-col items-center mb-6">
      <div class="w-12 h-12 bg-indigo-600/10 border border-indigo-500/30 rounded-2xl flex items-center justify-center mb-3 shadow-[0_0_20px_rgba(79,70,229,0.2)]">
        <svg class="w-7 h-7 text-indigo-400" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1 class="text-xl font-extrabold text-white tracking-tight">My Business</h1>
      <p id="auth-subtitle" class="text-xs text-slate-450 mt-1 text-center">Login to your dashboard to manage capital operations</p>
    </div>

    <!-- Tab Switcher -->
    <div class="relative flex bg-[#050a18] border border-[#152243] p-1 rounded-xl mb-6">
      <div id="auth-tab-glow" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-gradient-to-r from-indigo-600 to-violet-600 rounded-lg transition-all duration-350 ease-out shadow-lg shadow-indigo-600/30"></div>
      <button id="tab-login" onclick="toggleAuthMode('login')" class="flex-1 py-1.5 text-xs font-semibold text-white relative z-10 focus:outline-none transition-colors duration-305 cursor-pointer">Login</button>
      <button id="tab-signup" onclick="toggleAuthMode('signup')" class="flex-1 py-1.5 text-xs font-semibold text-slate-500 relative z-10 focus:outline-none transition-colors duration-305 cursor-pointer">Sign Up</button>
    </div>

    <!-- Message Boxes -->
    <div id="auth-error-box" class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl text-[11px] flex items-center gap-2.5">
      <span>⚠️</span>
      <span id="auth-error-msg">Incorrect credentials or missing input.</span>
    </div>

    <div id="auth-success-box" class="hidden mb-4 p-3 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-xl text-[11px] flex items-center gap-2.5">
      <span>✅</span>
      <span id="auth-success-msg">Welcome back! Loading your dashboard...</span>
    </div>

    <!-- Forms Container -->
    <div class="w-full overflow-hidden">
      <div id="auth-form-slider" class="flex w-[200%] transition-transform duration-500 ease-out">
        
        <!-- LOGIN FORM -->
        <form id="form-login" onsubmit="handleLogin(event)" class="w-1/2 pr-3 space-y-4">
          <div class="space-y-1.5">
            <label class="block text-[11px] font-semibold text-slate-400">Email Address</label>
            <div class="relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm">📧</span>
              <input type="email" id="login-email" required placeholder="name@domain.com" class="w-full bg-[#050a18] border border-[#152243] focus:border-indigo-500 focus:shadow-[0_0_15px_rgba(79,70,229,0.15)] rounded-xl pl-10 pr-4 py-2.5 text-xs text-slate-200 outline-none transition-all duration-300">
            </div>
          </div>

          <div class="space-y-1.5">
            <div class="flex justify-between items-center">
              <label class="block text-[11px] font-semibold text-slate-400">Password</label>
              <a href="#" onclick="alert('Password reset link simulated')" class="text-[10px] text-indigo-400 hover:text-indigo-300 transition-colors font-medium">Forgot?</a>
            </div>
            <div class="relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm">🔒</span>
              <input type="password" id="login-password" required placeholder="••••••••" class="w-full bg-[#050a18] border border-[#152243] focus:border-indigo-500 focus:shadow-[0_0_15px_rgba(79,70,229,0.15)] rounded-xl pl-10 pr-10 py-2.5 text-xs text-slate-200 outline-none transition-all duration-300">
              <button type="button" onclick="togglePasswordVisibility('login-password', this)" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-350 cursor-pointer text-xs select-none">👁️</button>
            </div>
          </div>

          <button type="submit" class="w-full bg-[#4f46e5] hover:bg-indigo-600 text-white rounded-xl py-3 text-xs font-bold transition-all duration-300 transform active:scale-98 shadow-lg shadow-indigo-600/20 cursor-pointer flex items-center justify-center gap-2">
            <span class="btn-text">Sign In</span>
            <div class="spinner hidden w-4.5 h-4.5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          </button>
        </form>

        <!-- SIGN UP FORM -->
        <form id="form-signup" onsubmit="handleSignup(event)" class="w-1/2 pl-3 space-y-4">
          <div class="space-y-1.5">
            <label class="block text-[11px] font-semibold text-slate-400">Full Name</label>
            <div class="relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm">👤</span>
              <input type="text" id="signup-name" required placeholder="John Doe" class="w-full bg-[#050a18] border border-[#152243] focus:border-indigo-500 focus:shadow-[0_0_15px_rgba(79,70,229,0.15)] rounded-xl pl-10 pr-4 py-2.5 text-xs text-slate-200 outline-none transition-all duration-300">
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="block text-[11px] font-semibold text-slate-400">Email Address</label>
            <div class="relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm">📧</span>
              <input type="email" id="signup-email" required placeholder="john@example.com" class="w-full bg-[#050a18] border border-[#152243] focus:border-indigo-500 focus:shadow-[0_0_15px_rgba(79,70,229,0.15)] rounded-xl pl-10 pr-4 py-2.5 text-xs text-slate-200 outline-none transition-all duration-300">
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="block text-[11px] font-semibold text-slate-400">Phone Number (ID)</label>
            <div class="relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm">📞</span>
              <input type="text" id="signup-phone" required placeholder="e.g. 03325700270" class="w-full bg-[#050a18] border border-[#152243] focus:border-indigo-500 focus:shadow-[0_0_15px_rgba(79,70,229,0.15)] rounded-xl pl-10 pr-4 py-2.5 text-xs text-slate-200 outline-none transition-all duration-300">
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="block text-[11px] font-semibold text-slate-400">Password</label>
            <div class="relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm">🔒</span>
              <input type="password" id="signup-password" required placeholder="Min 6 characters" class="w-full bg-[#050a18] border border-[#152243] focus:border-indigo-500 focus:shadow-[0_0_15px_rgba(79,70,229,0.15)] rounded-xl pl-10 pr-10 py-2.5 text-xs text-slate-200 outline-none transition-all duration-300">
              <button type="button" onclick="togglePasswordVisibility('signup-password', this)" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-350 cursor-pointer text-xs select-none">👁️</button>
            </div>
          </div>

          <button type="submit" class="w-full bg-gradient-to-r from-violet-600 to-indigo-650 hover:from-violet-500 hover:to-indigo-600 text-white rounded-xl py-3 text-xs font-bold transition-all duration-300 transform active:scale-98 shadow-lg shadow-violet-650/20 cursor-pointer flex items-center justify-center gap-2">
            <span class="btn-text">Register Account</span>
            <div class="spinner hidden w-4.5 h-4.5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="./js/auth.js"></script>
</body>
</html>
